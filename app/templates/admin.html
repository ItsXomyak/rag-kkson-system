<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>KKSON RAG — Админ-панель</title>
  <script>
    // Sync theme from localStorage BEFORE paint to avoid a flash of wrong theme.
    try {
      var t = localStorage.getItem('theme');
      if (t === 'dark' || t === 'light') document.documentElement.dataset.theme = t;
    } catch (e) {}
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/themes.css">
  <link rel="stylesheet" href="/static/css/main.css">
  <link rel="stylesheet" href="/static/css/admin.css">
</head>
<body>

<div class="admin-page">

  <!-- Top bar -->
  <header class="admin-topbar">
    <div class="admin-topbar-logo">K</div>
    <div class="admin-topbar-title">KKSON <span>Админ-панель</span></div>
    <button id="admin-theme-toggle" class="admin-icon-btn" title="Сменить тему" type="button">
      <span id="admin-theme-icon">☾</span>
    </button>
    <a href="/" class="admin-back-link">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      <span>К поиску</span>
    </a>
  </header>

  <main class="admin-container">

    <!-- Upload section -->
    <section class="admin-card">
      <div class="admin-card-header">
        <div class="admin-card-title">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          Загрузка PDF
        </div>
      </div>
      <div class="admin-card-body">
        <label class="dropzone" id="dropzone">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          <div class="dropzone-title">Перетащите PDF сюда или нажмите, чтобы выбрать</div>
          <div class="dropzone-sub">Несколько файлов, до 50 МБ каждый · только .pdf</div>
          <input type="file" id="file-input" multiple accept=".pdf,application/pdf">
        </label>
        <div class="upload-list" id="upload-list"></div>
      </div>
    </section>

    <!-- Documents section -->
    <section class="admin-card">
      <div class="admin-card-header">
        <div class="admin-card-title">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>
          Документы в базе
        </div>
        <span class="admin-card-count" id="docs-count">0</span>
      </div>
      <div class="admin-card-body">
        <input type="text" id="docs-search" class="docs-search" placeholder="Поиск по названию файла...">
        <div class="docs-list" id="docs-list">
          <div class="docs-empty">Загрузка…</div>
        </div>
      </div>
    </section>

  </main>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script src="/static/js/admin.js"></script>
</body>
</html>
